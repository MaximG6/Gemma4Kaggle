name: voicebridge_app
description: VoiceBridge — Offline multilingual clinical intake AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  riverpod: ^2.6.0
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.0
  record: ^5.1.2
  pdf: ^3.11.0
  path_provider: ^2.1.0
  path: ^1.9.0
  http: ^1.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.17.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/Inter/
    - assets/fonts/JetBrainsMono/
    - assets/icons/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf
